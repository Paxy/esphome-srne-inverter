# ============================================================================
# SRNE HSI-1500S — ESPHome Configuration
# ============================================================================
# Example config for the SRNE HSI-1500S (1.5KW, 12V, single phase, single
# MPPT). No component changes are needed for this model: the component
# detects the smaller register space at runtime and shrinks its Block A/B2
# reads automatically (see REGISTER_MAP_HSI1500S.md).
#
# What changed vs the other example YAMLs:
#   - No PV2 sensors (HSI-1500S has a single MPPT; pv_total_power = PV1)
#   - No L2/split-phase or combined L1+L2 sensors (single phase)
#   - No DC Bus +/- sensors (0x0228/0x0229 don't exist on this model)
#   - All diagnostics, sensors, switches, selects and numbers retained
#
# Battery: 12V LFP (4S, nominal 12.8V, full 13.6V, empty 10.0V)
# PV: Single MPPT
# Grid: Single phase 230V/50Hz
# ============================================================================

substitutions:
  name: srne-hsi1500s
  device_description: "SRNE HSI-1500S 1.5KW Hybrid Inverter"
  external_components_source: https://github.com/RAR/esphome-srne-inverter.git
  tx_pin: GPIO16
  rx_pin: GPIO17

esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2024.6.0
  project:
    name: "rar.esphome-srne-inverter"
    version: 1.0.0

esp32:
  variant: esp32
  flash_size: 4MB
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: ${external_components_source}
      ref: main
    refresh: 0s

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

uart:
  id: uart_0
  baud_rate: 9600
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  rx_buffer_size: 256

srne_modbus:
  id: modbus0
  uart_id: uart_0

srne_inverter:
  id: inv0
  srne_modbus_id: modbus0
  address: 0x01
  update_interval: 10s

# ============================================================================
# BINARY SENSORS
# ============================================================================
binary_sensor:
  - platform: status
    name: "SRNE Monitor Status"
    id: device_status

  - platform: srne_inverter
    srne_inverter_id: inv0
    online_status:
      name: "Inverter Online"
      id: inv_online
    grid_present:
      name: "Grid Present"
      id: inv_grid_present
    inverter_on_load:
      name: "Inverter On Load"
      id: inv_on_load
    fault:
      name: "Inverter Fault"
      id: inv_fault
    # split_phase_mode removed — does not exist on HSI-1500S

# ============================================================================
# SENSORS
# ============================================================================
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

  - platform: srne_inverter
    srne_inverter_id: inv0

    # ── Battery (0x0100-0x0103) ───────────────────────────────────────────
    # 12V LFP battery. Register 0x0100 = SOC, 0x0101 = voltage (0.1V),
    # 0x0102 = current (0.1A, signed). Note: without BMS communication via
    # CAM bus, SOC may be inaccurate or stuck at 0/100.
    battery_soc:
      name: "Battery SOC"
      id: inv_battery_soc
    battery_voltage:
      name: "Battery Voltage"
      id: inv_battery_voltage
    battery_current:
      name: "Battery Current"
      id: inv_battery_current
    battery_power:
      name: "Battery Power"
      id: inv_battery_power

    # ── PV / Solar (0x0107-0x010E) ────────────────────────────────────────
    # Single MPPT (PV1 only). PV2 does not exist on this model.
    pv1_voltage:
      name: "PV Voltage"
      id: inv_pv_voltage
    pv1_current:
      name: "PV Current"
      id: inv_pv_current
    pv1_power:
      name: "PV Power"
      id: inv_pv_power
    # PV2 removed — does not exist on HSI-1500S (ERROR 0x02 at 0x010F+)
    pv_total_power:
      name: "PV Total Power"
      id: inv_pv_total_power
    pv_charge_current:
      name: "PV Charge Current"
      id: inv_pv_charge_current
    charge_power:
      name: "Charge Power"
      id: inv_charge_power

    # ── Inverter / Grid / Load (0x0210-0x0227) ────────────────────────────
    # Single phase only. L2 registers (0x0228+) do not exist.
    bus_voltage:
      name: "Bus Voltage"
      id: inv_bus_voltage
      entity_category: diagnostic
    grid_voltage:
      name: "Grid Voltage"
      id: inv_grid_voltage
    grid_current:
      name: "Grid Current"
      id: inv_grid_current
    grid_frequency:
      name: "Grid Frequency"
      id: inv_grid_frequency
    inverter_voltage:
      name: "Inverter Voltage"
      id: inv_inverter_voltage
    inverter_current:
      name: "Inverter Current"
      id: inv_inverter_current
    inverter_frequency:
      name: "Inverter Frequency"
      id: inv_inverter_frequency
    load_current:
      name: "Load Current"
      id: inv_load_current
    load_active_power:
      name: "Load Power"
      id: inv_load_power
    load_apparent_power:
      name: "Load Apparent Power"
      id: inv_load_va
    load_percent:
      name: "Load Percent"
      id: inv_load_percent
    battery_charge_current:
      name: "Mains Charge Current"
      id: inv_mains_charge_current

    # ── Temperature (0x0220-0x0222) ───────────────────────────────────────
    heatsink_a_temperature:
      name: "Heatsink A Temp"
      id: inv_temp_a
      entity_category: diagnostic
    heatsink_b_temperature:
      name: "Heatsink B Temp"
      id: inv_temp_b
      entity_category: diagnostic
    heatsink_c_temperature:
      name: "Heatsink C Temp"
      id: inv_temp_c
      entity_category: diagnostic

    # ── Removed (do not exist on HSI-1500S) ───────────────────────────────
    # dc_bus_positive_voltage  → 0x0228 = ERROR
    # dc_bus_negative_voltage  → 0x0229 = ERROR
    # inverter_voltage_l2      → 0x022A+ = ERROR
    # inverter_current_l2      → ERROR
    # load_*_l2                → ERROR
    # inverter_voltage_l1_l2   → ERROR
    # load_*_total             → ERROR (single phase, total = L1)

# ============================================================================
# TEXT SENSORS
# ============================================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"

  - platform: version
    name: "ESPHome Version"

  - platform: srne_inverter
    srne_inverter_id: inv0
    machine_state:
      name: "Machine State"
      id: inv_machine_state
      entity_category: diagnostic
    charge_state:
      name: "Charge State"
      id: inv_charge_state
    fault_codes:
      name: "Fault Codes"
      entity_category: diagnostic
    software_version:
      name: "Inverter Firmware"
      entity_category: diagnostic
    hardware_version:
      name: "Inverter Hardware"
      entity_category: diagnostic
    serial_number:
      name: "Inverter Serial"
      entity_category: diagnostic
    battery_type:
      name: "Battery Type"
      entity_category: diagnostic

# ============================================================================
# SWITCHES
# ============================================================================
switch:
  - platform: restart
    name: "Restart"

  - platform: srne_inverter
    srne_inverter_id: inv0
    eco_mode:
      name: "Eco Mode"
      id: inv_eco_mode
    overload_auto_restart:
      name: "Overload Auto Restart"
      id: inv_overload_restart
    overheat_auto_restart:
      name: "Overheat Auto Restart"
      id: inv_overheat_restart
    buzzer_alarm:
      name: "Buzzer Alarm"
      id: inv_buzzer
    inverter_to_bypass:
      name: "Inverter to Bypass"
      id: inv_inv_to_bypass

# ============================================================================
# SELECT (dropdown options)
# ============================================================================
select:
  - platform: srne_inverter
    srne_inverter_id: inv0
    output_priority:
      name: "Output Priority"
      id: inv_output_priority
    charge_priority:
      name: "Charge Priority"
      id: inv_charge_priority
    ac_input_voltage_range:
      name: "AC Input Voltage Range"
      id: inv_ac_range
    # parallel_mode removed — does not exist on HSI-1500S

# ============================================================================
# NUMBER (adjustable values)
# ============================================================================
number:
  - platform: srne_inverter
    srne_inverter_id: inv0
    max_charge_current:
      name: "Max Charge Current"
      id: inv_max_charge
    mains_charge_current_limit:
      name: "Mains Charge Current Limit"
      id: inv_mains_charge_limit
    output_voltage:
      name: "Output Voltage"
      id: inv_output_voltage

    # SOC thresholds — require BMS communication to take effect properly
    soc_discharge_alarm:
      name: "SOC Discharge Alarm"
      id: inv_soc_alarm
    soc_discharge_cutoff:
      name: "SOC Discharge Cutoff"
      id: inv_soc_cutoff
    soc_charge_cutoff:
      name: "SOC Charge Cutoff"
      id: inv_soc_charge_cutoff
    soc_switch_to_mains:
      name: "SOC Switch to Mains"
      id: inv_soc_to_mains
    soc_switch_to_inverter:
      name: "SOC Switch to Inverter"
      id: inv_soc_to_inverter
